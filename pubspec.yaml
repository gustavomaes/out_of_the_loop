name: outoftheloop
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  audioplayers: ^6.6.0
  confetti: ^0.8.0
  firebase_analytics: ^12.4.1
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^17.2.3
  intl: any
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/content/
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik[wght].ttf
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans[wght].ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk[wght].ttf
